<div class="flex items-center justify-center min-h-screen bg-gradient-to-br from-[#1B102E] via-[#042F2E] to-[#FF77A9]">

  <div class="relative w-full max-w-md p-8 bg-white shadow-xl rounded-2xl">

    <!-- CLOSE BUTTON (NEW ADDED) -->
    <button
      routerLink="/"
      class="absolute text-xl text-gray-500 top-4 right-4 hover:text-gray-700">
      ✕
    </button>
    <!-- END CLOSE BUTTON -->

    <h2 class="mb-6 text-2xl font-semibold text-center">
      Create Account
    </h2>

    <!-- ERROR -->
    <p *ngIf="error" class="mb-3 text-sm text-red-500">
      {{error}}
    </p>

    <!-- SUCCESS -->
    <p *ngIf="success" class="mb-3 text-sm text-green-600">
      {{success}}
    </p>

    <form (ngSubmit)="register()" class="space-y-4">

      <input
        type="text"
        placeholder="Full Name"
        [(ngModel)]="name"
        name="name"
        class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">

      <input
        type="email"
        placeholder="Email"
        [(ngModel)]="email"
        name="email"
        class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">

      <input
        type="password"
        placeholder="Password"
        [(ngModel)]="password"
        name="password"
        class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">

      <input
        type="password"
        placeholder="Confirm Password"
        [(ngModel)]="confirmPassword"
        name="confirmPassword"
        class="w-full px-4 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-500">

      <button
        class="w-full py-2 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">
        Register
      </button>

    </form>

    <p class="mt-4 text-sm text-center">

      Already have an account?

      <a routerLink="/login" class="text-indigo-600 hover:underline">
        Login
      </a>

    </p>

  </div>

</div>
