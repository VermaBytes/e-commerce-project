<div class="max-w-6xl p-6 mx-auto">

  <h1 class="mb-8 text-3xl font-bold text-gray-800">
    🛒 Shopping Cart
  </h1>

  <!-- Empty Cart -->
  <div *ngIf="cartItems.length === 0"
       class="py-10 text-center text-gray-500">
    Your cart is empty 😔
  </div>

  <!-- Cart Items -->
  <div *ngIf="cartItems.length > 0" class="space-y-4">

    <div *ngFor="let item of cartItems"
         class="flex items-center justify-between p-4 bg-white rounded-lg shadow">

      <!-- Left -->
      <div class="flex items-center gap-4">

        <img
          [src]="'http://localhost:5000/images/' + item.image"
          class="object-cover w-24 h-24 rounded-lg border">

        <div>
          <h2 class="text-lg font-semibold text-gray-800">
            {{item.name}}
          </h2>

          <p class="text-indigo-600 font-bold">
            ₹{{item.price}}
          </p>
        </div>

      </div>

      <!-- Right -->
      <div class="flex items-center gap-4">

        <!-- Quantity -->
        <div class="flex items-center border rounded">

          <button (click)="decreaseQty(item)"
                  class="px-3 py-1 text-lg bg-gray-200 hover:bg-gray-300">
            -
          </button>

          <span class="px-4 font-semibold">
            {{item.quantity}}
          </span>

          <button (click)="increaseQty(item)"
                  class="px-3 py-1 text-lg bg-gray-200 hover:bg-gray-300">
            +
          </button>

        </div>

        <!-- Subtotal -->
        <p class="font-semibold text-gray-700 w-24 text-right">
          ₹{{item.price * item.quantity}}
        </p>

        <!-- Remove -->
        <button
          (click)="removeItem(item)"
          class="px-4 py-2 text-white bg-red-500 rounded hover:bg-red-600">
          Remove
        </button>

      </div>

    </div>

  </div>

  <!-- Summary -->
  <div *ngIf="cartItems.length > 0"
       class="p-6 mt-8 bg-white rounded-lg shadow">

    <div class="flex justify-between text-lg">
      <span>Total Items:</span>
      <span>{{totalItems}}</span>
    </div>

    <div class="flex justify-between mt-2 text-2xl font-bold">
      <span>Total Price:</span>
      <span class="text-green-600">₹{{total}}</span>
    </div>

    <button routerLink="/checkout"
            class="w-full py-3 mt-6 text-white bg-green-600 rounded-lg hover:bg-green-700">
      Proceed to Checkout
    </button>

  </div>

</div>
