<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">

  <div class="relative w-full max-w-sm p-6 bg-white shadow-xl rounded-xl">

    <button
      type="button"
      (click)="closeModal()"
      class="absolute text-lg text-gray-500 top-3 right-3 hover:text-black">
      ✕
    </button>

    <h2 class="mb-4 text-xl font-semibold text-center">
      Login
    </h2>

    <p *ngIf="error" class="mb-2 text-sm text-red-500">
      {{error}}
    </p>

    <form (ngSubmit)="login()" #loginForm="ngForm">

      <input
        [(ngModel)]="email"
        name="email"
        required
        type="email"
        placeholder="Email"
        class="w-full px-3 py-2 mb-3 border rounded">

      <input
        [(ngModel)]="password"
        name="password"
        required
        type="password"
        placeholder="Password"
        class="w-full px-3 py-2 mb-3 border rounded">

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full py-2 text-white bg-indigo-600 rounded">
        Login
      </button>

    </form>

    <p class="mt-4 text-sm text-center">

      New user?

      <a
        routerLink="/register"
        (click)="goToRegister()"
        class="text-indigo-600 hover:underline">
        Register Here
      </a>

    </p>

  </div>

</div>
