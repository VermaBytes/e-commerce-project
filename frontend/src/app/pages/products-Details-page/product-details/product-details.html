<div *ngIf="product"
    class="grid grid-cols-2 gap-10 p-10">

    <div>

        <img
            [src]="'http://localhost:5000/images/'+product.image"
            class="w-full rounded-lg shadow">
    </div>

    <div>

        <h1 class="text-3xl font-bold">
            {{product.name}}
        </h1>

        <p class="mt-4 text-gray-600">
            {{product.description}}
        </p>

        <p class="mt-4 text-2xl font-bold text-indigo-600">
            ₹{{product.price}}
        </p>

        <button
            (click)="addToCart(product)"
            [disabled]="isInCart"
            class="px-6 py-3 mt-6 text-white rounded"
            [ngClass]="isInCart ? 'bg-gray-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700'">

            {{ isInCart ? 'Already Added' : 'Add To Cart' }}

        </button>
        <button (click)="buyNow(product)"
            class="px-6 py-3 mt-6 ml-4 text-white bg-orange-500 rounded">

            Buy Now

        </button>

    </div>

</div>
