<div class="p-10">

    <h1 class="mb-6 text-2xl font-bold">
        All Products
    </h1>

    <table class="w-full bg-white border">

        <tr class="bg-gray-200">

            <th class="p-3">Image</th>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Action</th>   
        </tr>

        <tr *ngFor="let product of products"
            class="text-center border-t">

            <td>
                <img
                    [src]="'http://localhost:5000/images/'+product.image"
                    class="object-cover w-16 h-16 mx-auto">
            </td>

            <td>{{product.name}}</td>

            <td>₹{{product.price}}</td>

            <td>{{product.category}}</td>

            <td class="space-x-2">

                <button
                    [routerLink]="['/admin/edit-product',product.id]"
                    class="px-3 py-1 text-white bg-yellow-500 rounded">

                    Edit

                </button>
                
                <button
                    (click)="deleteProduct(product.id)"
                    class="px-3 py-1 text-white bg-red-500 rounded">

                    Delete

                </button>

            </td>

        </tr>

    </table>

</div>
