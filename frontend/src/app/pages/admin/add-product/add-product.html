<div class="max-w-2xl p-10 mx-auto mt-10 bg-white shadow-lg rounded-xl">

    <h1 class="mb-6 text-2xl font-bold">
        Add New Product
    </h1>

    <form [formGroup]="productForm"
        (ngSubmit)="addProduct()"
        class="space-y-4">

        <!-- Product Name -->

        <input
            formControlName="name"
            placeholder="Product Name"
            class="w-full p-3 border rounded" />

        <!-- Description -->

        <textarea
            formControlName="description"
            placeholder="Product Description"
            class="w-full p-3 border rounded">
</textarea>

        <!-- Price -->

        <input
            formControlName="price"
            type="number"
            placeholder="Price"
            class="w-full p-3 border rounded" />

        <!-- CATEGORY DROPDOWN -->

        <select
            formControlName="category"
            class="w-full p-3 border rounded">

            <option value>Select Category</option>

            <option value="laptops">Laptops</option>

            <option value="macbooks">Mackbooks</option>

            <option value="printers">Printers</option>
            
            <option value="routers">Routers</option>

            <option value="pendrive">Pendrive</option>

            <option value="monitors">Monitors</option>

            <option value="keyboard">Keyboard</option>

            <option value="mouse">Mouse</option>

        </select>

        <!-- Image Upload -->
        

        <input
            type="file"
            (change)="onFileSelected($event)"
            class="w-full p-3 border rounded" #fileInput />

        <button [disabled]="productForm.invalid"
            class="w-full py-3 text-white bg-indigo-600 rounded hover:bg-indigo-700">

            Add Product

        </button>

    </form>

</div>
