<div class="grid grid-cols-2 gap-10 p-10">

  <!-- LEFT: FORM -->
  <div class="p-6 bg-white rounded-lg shadow">

    <h1 class="mb-6 text-2xl font-bold">
      Checkout Details
    </h1>

    <input
      [(ngModel)]="name"
      placeholder="Full Name"
      class="w-full p-3 mb-4 border rounded"
    />

    <textarea
      [(ngModel)]="address"
      placeholder="Address"
      class="w-full p-3 mb-4 border rounded">
    </textarea>

    <input
      [(ngModel)]="phone"
      placeholder="Phone Number"
      class="w-full p-3 mb-4 border rounded"
    />

    <button
      (click)="placeOrder()"
      class="w-full py-3 text-white bg-indigo-600 rounded hover:bg-indigo-700">

      Place Order

    </button>

  </div>

  <!-- RIGHT: ORDER SUMMARY -->
  <div class="p-6 bg-white rounded-lg shadow">

    <h2 class="mb-4 text-xl font-bold">
      Order Summary
    </h2>

    <div *ngFor="let item of cartItems"
         class="flex justify-between mb-2">

      <span>{{item.name}}</span>
      <span>₹{{item.price}}</span>

    </div>

    <hr class="my-4">

    <h2 class="text-xl font-bold">
      Total: ₹{{total}}
    </h2>

  </div>

</div>
