<!-- BACKDROP -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">

  <!-- MODAL -->
  <div class="relative w-full max-w-md p-6 bg-white shadow-xl rounded-2xl">

    <!-- CLOSE BUTTON -->
    <button
      (click)="close.emit()"
      class="absolute text-xl text-gray-500 top-3 right-3 hover:text-black">
      ✕
    </button>

    <!-- TITLE -->
    <h2 class="mb-4 text-2xl font-semibold text-center">
      {{ mode === 'login' ? 'Welcome Back 👋' : 'Create Account 🚀' }}
    </h2>

    <!-- TABS -->
    <div class="flex mb-6 overflow-hidden bg-gray-100 rounded-lg">

      <button
        (click)="switchMode('login')"
        [class.bg-white]="mode==='login'"
        class="w-1/2 py-2 font-medium">
        Login
      </button>

      <button
        (click)="switchMode('register')"
        [class.bg-white]="mode==='register'"
        class="w-1/2 py-2 font-medium">
        Register
      </button>

    </div>

    <!-- ERROR -->
    <div *ngIf="errorMsg"
         class="p-2 mb-3 text-sm text-red-600 bg-red-100 rounded">
      {{ errorMsg }}
    </div>

    <!-- SUCCESS -->
    <div *ngIf="successMsg"
         class="p-2 mb-3 text-sm text-green-600 bg-green-100 rounded">
      {{ successMsg }}
    </div>

    <!-- LOGIN -->
    <div *ngIf="mode === 'login'" class="space-y-3">

      <input [(ngModel)]="loginData.email"
        placeholder="Email"
        class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">

      <input [(ngModel)]="loginData.password"
        type="password"
        placeholder="Password"
        class="w-full p-3 border rounded-lg outline-none focus:ring-2 focus:ring-indigo-400">

      <button (click)="login()"
        [disabled]="loading"
        class="flex items-center justify-center w-full py-3 text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">

        <span *ngIf="loading"
          class="w-5 h-5 border-2 border-white rounded-full border-t-transparent animate-spin"></span>

        <span *ngIf="!loading">Login</span>

      </button>

    </div>

    <!-- REGISTER -->
    <div *ngIf="mode === 'register'" class="space-y-3">

  <!-- EMAIL + SEND OTP -->
  <div *ngIf="!otpSent">
    <input [(ngModel)]="email"
      placeholder="Enter Email"
      class="w-full p-3 border rounded-lg">

    <button (click)="sendOtp()"
      class="w-full py-3 text-white bg-indigo-600 rounded-lg">
      Send OTP
    </button>
  </div>

  <!-- OTP INPUT -->
  <div *ngIf="otpSent && !otpVerified">

    <input [(ngModel)]="otp"
      placeholder="Enter OTP"
      class="w-full p-3 border rounded-lg">

    <button (click)="verifyOtp()"
      class="w-full py-3 text-white bg-indigo-600 rounded-lg">
      Verify OTP
    </button>

    <!-- TIMER -->
    <p class="mt-2 text-sm text-gray-500">
      ⏳ {{ timer }} sec remaining
    </p>

    <!-- RESEND -->
    <button *ngIf="canResend"
      (click)="sendOtp()"
      class="mt-2 text-sm text-indigo-600">
      Resend OTP
    </button>

  </div>

  <!-- CREATE ACCOUNT -->
  <div *ngIf="otpVerified">

    <input [(ngModel)]="userData.name"
      placeholder="Full Name"
      class="w-full p-3 border rounded-lg">

    <input [(ngModel)]="userData.password"
      type="password"
      placeholder="Password"
      class="w-full p-3 border rounded-lg">

    <input [(ngModel)]="userData.phone"
      placeholder="Phone"
      class="w-full p-3 border rounded-lg">

    <button (click)="register()"
      class="w-full py-3 text-white bg-indigo-600 rounded-lg">
      Create Account
    </button>

  </div>

</div>

  </div>
</div>
