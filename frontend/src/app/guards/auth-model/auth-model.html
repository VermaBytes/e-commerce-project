<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">

<div class="w-full max-w-sm p-6 bg-white rounded-xl">

<button
(click)="closeModal()"
class="absolute text-lg top-3 right-3">
✕
</button>

<h2 class="mb-4 text-xl font-semibold text-center">
Create Account
</h2>

<p *ngIf="error" class="text-red-500">{{error}}</p>

<!-- USER INFO FORM -->

<form *ngIf="!otpSent" (ngSubmit)="sendOtp()" #form="ngForm">

<input
[(ngModel)]="name"
name="name"
required
placeholder="Full Name"
class="w-full px-3 py-2 mb-3 border rounded">

<input
[(ngModel)]="email"
name="email"
required
placeholder="Email"
class="w-full px-3 py-2 mb-3 border rounded">

<input
[(ngModel)]="mobile"
name="mobile"
required
placeholder="Mobile Number"
class="w-full px-3 py-2 mb-3 border rounded">

<button
type="submit"
class="w-full py-2 text-white bg-indigo-600 rounded">
Send OTP
</button>

</form>

<!-- OTP FORM -->

<form *ngIf="otpSent" (ngSubmit)="verifyOtp()">

<input
[(ngModel)]="otp"
name="otp"
required
placeholder="Enter OTP"
class="w-full px-3 py-2 mb-3 border rounded">

<button
type="submit"
class="w-full py-2 text-white bg-green-600 rounded">
Verify OTP
</button>

</form>

</div>

</div>
