
<div class="grid grid-cols-4 gap-6 p-10">

  <div *ngFor="let product of products"
    class="p-4 border rounded-lg shadow hover:shadow-xl">

    <img
      [src]="'http://localhost:5000/images/'+product.image"
      class="object-cover w-full h-40 rounded">

    <h2 class="mt-3 text-lg font-semibold">
      {{product.name}}
    </h2>

    <p class="font-bold text-indigo-600">
      ₹{{product.price}}
    </p>

    <button
      [routerLink]="['/product', product.id]"
      class="px-4 py-2 mt-3 text-white bg-indigo-600 rounded hover:bg-indigo-700">

      View Details

    </button>

  </div>

</div>
