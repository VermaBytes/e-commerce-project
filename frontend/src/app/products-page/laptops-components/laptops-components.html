<div class="grid grid-cols-1 gap-8 p-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

  <div *ngFor="let product of products"
       class="overflow-hidden transition duration-300 bg-white border shadow-sm rounded-xl hover:shadow-xl">

    <!-- Product Image -->
    <div class="relative overflow-hidden">
      <img
        [src]="'http://localhost:5000/images/' + product.image"
        class="object-cover w-full h-48 transition-transform duration-300 hover:scale-105"
      />
    </div>

    <!-- Product Info -->
    <div class="p-4">

      <h2 class="text-lg font-semibold text-gray-800 line-clamp-2">
        {{product.name}}
      </h2>

      <p class="mt-2 text-xl font-bold text-indigo-600">
        ₹{{product.price}}
      </p>

      <!-- Button -->
      <button
        [routerLink]="['/product', product.id]"
        class="w-full px-4 py-2 mt-4 font-medium text-white transition bg-indigo-600 rounded-lg hover:bg-indigo-700">

        View Details

      </button>

    </div>

  </div>

</div>
